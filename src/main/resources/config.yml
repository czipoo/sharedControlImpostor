# Shared Control Impostor Configuration

# World Settings
worlds:
  # Name of the meeting world (lobby world)
  # This world should exist in your server's world folder
  # Default: "meeting"
  meeting: "world"

# Game Settings
game:
  # Default turn time in seconds (minimum 5)
  # Can be changed with /settimer command
  default-turn-time: 15

  # Meeting cooldown in seconds
  # Players must wait this long before calling another meeting
  meeting-cooldown: 30

  # Default impostor count
  # Can be changed with /setimpostor command
  # Will be auto-balanced based on player count
  default-impostor-count: 1

# Objective Settings
objectives:
  # List of objectives that will be randomly selected
  # Format: type|description|clue|material|count
  # Available types: CHOP_LOGS, MINE_ORE, CRAFT_ITEM, PLACE_BLOCKS, KILL_MOB
  # Materials: Use Minecraft material names (e.g., COBBLESTONE, OAK_LOG, etc.)
  enabled:
    - "MINE_ORE|Mine {count} cobblestone|Stone must be gathered from underground...|COBBLESTONE|10"
    - "CHOP_LOGS|Chop {count} oak logs|Something wooden needs collecting...|OAK_LOG|5"
    - "CRAFT_ITEM|Craft a wooden pickaxe|A tool must be forged from basic materials...|WOODEN_PICKAXE|1"
    - "MINE_ORE|Mine {count} diamonds|Something shiny and blue needs to be mined...|DIAMOND_ORE|3"
    - "CRAFT_ITEM|Craft an iron pickaxe|A stronger tool must be forged...|IRON_PICKAXE|1"
